<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, intial-scale=1.0">
    <title>Form Task 1</title>
    <link rel="icon" href="Image/RAVANAN1.png">
</head>
<body> 
    <table align="center"  cellspacing="2"style="margin-top: 10px;" >
        <form>
            <tr>
                <th colspan="2">   
                    <h1 style="color: blue;">Please complete our survey</h1>
                </th> 
            </tr> 
            <tr>
                <th colspan="2" align="left"> Contact information</th>
            </tr>
            <tr>
                <td style="color: blue;">EMail address:</td>
                <td><input type="email" placeholder="Enter your Email"></td>
            </tr>
            <tr>
                <td style="color: blue;">First name:</td>
                <td><input type="text" placeholder="Enter your first Name"></td>
            </tr>
            <tr>
                <td style="color: blue;">Last name:</td>
                <td><input type="text" placeholder="Last Name"></td>
            </tr>
            <tr>
                <th colspan="2" align="left">
                    Geographic information
                </th>
            </tr>
            <tr>
                <td style="color: blue;">State:</td>
                <td><input type="text" placeholder="Two characters"></td>
            </tr>
            <tr>
                <td style="color: blue;">Pincode</td>
                <td><input type="number" placeholder="Five digits"></td>
            </tr>
            <tr>
                <th colspan="2" align="left"> How did you hear about us?</th>
            </tr>
            <tr>
                <td style="color: blue;">Web Search:</td>
                <td><input type="checkbox"></td>
            </tr>
            <tr>
                <td style="color: blue;">Facebook:</td>
                <td><input type="checkbox"></td>
            </tr>
            <tr>
                <td style="color: blue;">Twitter:</td>
                <td><input type="checkbox"></td>
            </tr>
            <tr>
                <td style="color: blue;">Email message:</td>
                <td><input type="checkbox"></td>
            </tr>
            <tr>
                <th colspan="2" align="left">Thank you for taking our survey!</th>
            </tr>
            <tr>
                <td align="right"><button type="submit">Submit</button></td>
                <td><button type="reset">Reset</button></td>
            </tr>
        </form>
    </table>
</body>
</html>
