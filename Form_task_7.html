<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Task 7</title>
    <link rel="icon" href="Image/RAVANAN1.png">
</head>
<body>
    <table border="">
        <form>
            <tr style="background-color: rgba(87, 87, 227, 0.485); text-align: center;">
                <th>Name</th>
                <th>Value</th>
            </tr>
            <tr>
                <td>Name</td>
                <td><input type="text"></td>
            </tr>
            <tr>
                <td>Sex</td>
                <td>
                    <input type="radio" name="gender">Male <br>
                    <input type="radio" name="gender">Female
                </td>
            </tr>
            <tr>
                <td>Eye color</td>
                <td>
                    <select>
                        <option value="1">Red</option>
                        <option value="2">Blue</option>
                        <option value="3">Green</option>
                        <option value="4">Grey</option>
                    </select>
                </td>
            </tr>
            <tr>
                <td>Check all that apply</td>
                <td>
                    <input type="checkbox">Over 6 feet tall <br>
                    <input type="checkbox">Over 200 pounds
                </td>
            </tr>
            <tr>
                <td colspan="2">Describe your athletic ability: <br>
                    <textarea></textarea>
                </td>
            </tr>
            <tr style="text-align:center">
                <td colspan="2">
                    <button type="submit">Entered my information</button>
                </td>
            </tr>
        </form>
    </table>
</body>
</html>
