<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Task 6</title>
    <link rel="icon" href="Image/RAVANAN1.png">
</head>
<body style="text-align: center;" >
    <table style="background-color: rgb(216, 140, 140); border-radius: 12px; padding: auto; width: 600px; height: 700px;">
        <form>
            <tr>
                <th colspan="2" style="text-align: center;"><u>Registration Form</u></th>
            </tr>
            <tr>
                <td>First Name</td>
                <td><input type="text"></td>
            </tr>
            <tr>
                <td>Last Name </td>
                <td><input type="text"></td>
            </tr>
            <tr>
                <td>Nick Name</td>
                <td><input type="text"></td>
            </tr>
            <tr>
                <td>e-mail</td>
                <td><input type="email"></td>
            </tr>
            <tr>
                <td>Password</td>
                <td><input type="password"></td>
            </tr>
            <tr>
                <td>Date of Birth</td>
                <td><input type="date"></td>
            </tr>
            <tr>
                <td>Gender</td>
                <td>
                    <input type="radio" name="Gender">Male
                    <input type="radio" name="Gender">Female
                    <input type="radio" name="Gender">Others
                </td>
            </tr>
            <tr>
                <td>Mobile</td>
                <td><input type="number"></td>
            </tr>
            <tr>
                <td>Address</td>
                <td><textarea name="" id=""></textarea></td>
            </tr>
            <tr>
                <td></td>
                <td>
                    <button type="submit">Submit</button>
                    <button type="reset">Reset</button>
                </td>
            </tr>
        </form>
    </table>
</body>
</html>
